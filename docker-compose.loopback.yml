# Loopback-only ingress override.
#
# The base docker-compose.yml publishes `3000:3000`, which Docker binds to
# 0.0.0.0 (all host interfaces). This deployment requires loopback-only
# binds: public reach for the app is provided exclusively by an outbound-only
# named Cloudflare Tunnel that dials Cloudflare's edge and connects back to
# 127.0.0.1:3000 — no inbound firewall port is ever opened on this host.
#
# This file also strips all host port publishes for the data-tier services
# (redis, database, studio) and enforces `requirepass` + `protected-mode yes`
# on redis. The app reaches redis via the internal docker network at
# `redis://redis:6379` (auth password supplied via REDIS_URL); no host bind
# is needed for any data-tier service.
#
# `!override` REPLACES the inherited ports list (compose merges port lists by
# concatenation otherwise, which would leave the 0.0.0.0 mapping in place).
# `!override []` strips the publishes entirely (internal docker network only).
#
# Isolated, additive, upstream-tracking: the upstream docker-compose.yml is
# left untouched so the fork stays rebaseable. Do not run this stack without
# this override — the base file's defaults expose unauthenticated services on
# the public internet.
#
# Usage (append LAST in the -f chain):
#   docker compose -p cal-diy \
#     -f docker-compose.yml \
#     -f docker-compose.validate.yml \
#     -f docker-compose.loopback.yml \
#     up -d

services:
  calcom:
    ports: !override
      - "127.0.0.1:3000:3000"

  redis:
    # No host publish. Internal-only via the docker network.
    ports: !override []
    # Enforce auth + protected-mode at server start. The redis:latest image
    # otherwise starts with no auth, which is unsafe even on an internal
    # network. REDIS_PASSWORD is loaded from .env.
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}"
      - "--protected-mode"
      - "yes"

  database:
    # Defense in depth: even though base compose doesn't publish 5432, lock it
    # explicitly so any future merge that adds `ports:` upstream is neutralised.
    ports: !override []

  # The base compose publishes API on `${API_PORT:-80}` to 0.0.0.0 and Prisma
  # Studio on `5555` to 0.0.0.0. Neither is currently part of the deploy stack,
  # but lock them down so accidentally bringing the full profile up does not
  # expose them publicly.
  calcom-api:
    ports: !override
      - "127.0.0.1:${API_PORT:-80}:${API_PORT:-80}"

  studio:
    ports: !override
      - "127.0.0.1:5555:5555"
