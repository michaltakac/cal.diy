# Loopback-only ingress override (Agentic Consulting AGE-28).
#
# The base docker-compose.yml publishes `3000:3000`, which Docker binds to
# 0.0.0.0 (all host interfaces). The Agentic Consulting hosting design
# (agentic-consulting/infra/, AGE-24 plan §2c) requires this host to bind
# LOOPBACK ONLY and never 0.0.0.0: public reach for Cal.diy is provided
# exclusively by an outbound-only named Cloudflare Tunnel
# (agentic.randomfour.co), which dials Cloudflare's edge and connects back to
# 127.0.0.1:3000 — no inbound firewall port is ever opened on this host.
#
# `!override` REPLACES the inherited ports list (compose merges port lists by
# concatenation otherwise, which would leave the 0.0.0.0 mapping in place).
#
# Isolated, additive, upstream-tracking: the upstream docker-compose.yml is
# left untouched so the fork stays rebaseable. Reversible (two-way door) —
# drop this -f file to restore the previous behaviour.
#
# Usage (append LAST in the -f chain):
#   docker compose -p cal-diy \
#     -f docker-compose.yml \
#     -f docker-compose.validate.yml \
#     -f docker-compose.loopback.yml \
#     up -d --no-deps calcom

services:
  calcom:
    ports: !override
      - "127.0.0.1:3000:3000"
